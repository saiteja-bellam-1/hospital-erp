name: License Manager build

# Builds KTLicenseManager.exe (the standalone vendor-facing license issuing app).
#
# Unlike the hospital ERP pipeline this produces a single PyInstaller .exe only —
# there is no Inno Setup installer, no signed update manifest, and no GitHub
# Release step. The build is always uploaded as a workflow artifact.
#
# Versioning is used purely for artifact naming:
#   * push to `main`          -> version = <base>.<github.run_number>
#   * PR / workflow_dispatch  -> version = <base>.<github.run_number>
# where <base> is the MAJOR.MINOR parsed from FastAPI(version="...") in app.py.

on:
  push:
    branches: [main]
    paths:
      - 'license-manager/**'
      - '.github/workflows/license-manager-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'license-manager/**'
      - '.github/workflows/license-manager-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    env:
      # Force Node 24 for JavaScript-based actions ahead of GitHub's
      # June 2026 cutover. Silences the Node 20 deprecation annotation
      # GitHub now adds to every run.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # ----- version resolution (artifact naming only) -----
      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $line = Select-String -Path 'license-manager\backend\app.py' -Pattern 'version\s*=\s*"([0-9]+\.[0-9]+)' | Select-Object -First 1
          if (-not $line) { Write-Error "Could not parse version from license-manager\backend\app.py"; exit 1 }
          $base = $line.Matches[0].Groups[1].Value
          $version = "$base.$env:GITHUB_RUN_NUMBER"
          Write-Host "Resolved version: $version"
          "version=$version" | Out-File $env:GITHUB_OUTPUT -Append

      # ----- toolchains -----
      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: license-manager/backend/requirements.txt

      - name: Setup Node 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: license-manager/frontend/package-lock.json

      # ----- build the .exe -----
      # build_exe.bat runs `npm ci` + `npm run build` for the React frontend,
      # installs backend deps (incl. pyinstaller) into the system Python, and
      # produces backend\dist\KTLicenseManager.exe. We redirect from NUL so the
      # `pause` at the end of the script does not block the runner.
      - name: Build KTLicenseManager.exe
        shell: cmd
        working-directory: license-manager
        env:
          # GitHub Actions sets CI=true, which makes Create React App treat
          # ESLint warnings as build errors. Locally devs run with CI unset
          # so the build passes. Override here so CI matches dev behavior.
          CI: 'false'
        run: build_exe.bat < NUL

      # ----- collect + verify -----
      - name: Locate exe artifact
        id: artifact
        shell: pwsh
        run: |
          $path = "license-manager\backend\dist\KTLicenseManager.exe"
          if (-not (Test-Path $path)) {
            Write-Error "Executable not found at $path"
            Get-ChildItem license-manager\backend\dist -ErrorAction SilentlyContinue
            exit 1
          }
          $size = (Get-Item $path).Length
          Write-Host "Executable: $path ($size bytes)"
          "path=$path" | Out-File $env:GITHUB_OUTPUT -Append

      # ----- upload -----
      - name: Upload exe artifact
        uses: actions/upload-artifact@v5
        with:
          name: KTLicenseManager_${{ steps.ver.outputs.version }}
          path: ${{ steps.artifact.outputs.path }}
          if-no-files-found: error
          retention-days: 30
