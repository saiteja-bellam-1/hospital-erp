name: Windows installer build

# Builds KTHEALTHERP_Setup_<version>.exe.
#
# Versioning rules:
#   * tag push `vMAJOR.MINOR.PATCH` -> version = MAJOR.MINOR.PATCH (publishes a Release).
#   * push to `main`                -> version = <base>.<github.run_number> (also publishes).
#   * PR / workflow_dispatch        -> version = <base>.<run_number>, artifact only (no Release).
#
# APP_VERSION (in app/version.py) is patched to the resolved value before
# building so the runtime version, .exe metadata, and installer filename match.
# INSTALLER_VERSION (passed to Inno Setup) is set from the same resolved value.
# On tagged releases a signed manifest.json is also built and uploaded alongside
# the installer so the in-app self-update feature can find it.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # needed to upload to a Release on tag push

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45

    env:
      # Force Node 24 for JavaScript-based actions ahead of GitHub's
      # June 2026 cutover. Silences the Node 20 deprecation annotation
      # GitHub now adds to every run.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # ----- version resolution -----
      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $line = Select-String -Path 'backend\app\version.py' -Pattern 'APP_VERSION\s*=\s*"([0-9]+\.[0-9]+)' | Select-Object -First 1
          if (-not $line) { Write-Error "Could not parse APP_VERSION from app/version.py"; exit 1 }
          $base = $line.Matches[0].Groups[1].Value

          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $version = $env:GITHUB_REF -replace '^refs/tags/v',''
            $isRelease = 'true'
          } elseif ($env:GITHUB_EVENT_NAME -eq 'push' -and $env:GITHUB_REF -eq 'refs/heads/main') {
            $version = "$base.$env:GITHUB_RUN_NUMBER"
            $isRelease = 'true'
          } else {
            $version = "$base.$env:GITHUB_RUN_NUMBER"
            $isRelease = 'false'
          }
          Write-Host "Resolved version: $version (release=$isRelease)"
          "version=$version"     | Out-File $env:GITHUB_OUTPUT -Append
          "is_release=$isRelease" | Out-File $env:GITHUB_OUTPUT -Append

      - name: Patch APP_VERSION in app/version.py
        shell: pwsh
        run: |
          $v = '${{ steps.ver.outputs.version }}'
          $path = 'backend\app\version.py'
          (Get-Content $path) `
            -replace 'APP_VERSION\s*=\s*"[^"]+"', ('APP_VERSION = "{0}"' -f $v) `
            | Set-Content $path -Encoding UTF8
          Select-String -Path $path -Pattern 'APP_VERSION' | Select-Object -First 1

      # ----- toolchains -----
      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.lock
            backend/requirements.txt

      - name: Setup Node 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          # Make sure ISCC.exe is on PATH for downstream steps
          "$env:ProgramFiles (x86)\Inno Setup 6" | Out-File $env:GITHUB_PATH -Append
          "$env:ProgramFiles\Inno Setup 6"      | Out-File $env:GITHUB_PATH -Append

      # ----- build the .exe -----
      # build_exe.bat installs backend deps (incl. pyinstaller) into the
      # system Python via plain `pip install`, builds the React bundle, and
      # produces backend\dist\KTHEALTHERP.exe. We redirect from NUL so the
      # `pause` at the end of the script does not block the runner.
      - name: Build KTHEALTHERP.exe
        shell: cmd
        env:
          # GitHub Actions sets CI=true, which makes Create React App treat
          # ESLint warnings as build errors. Locally devs run with CI unset
          # so the build passes. Override here so CI matches dev behavior.
          CI: 'false'
        run: build_exe.bat < NUL

      - name: Build dbcheck.exe (wizard helper)
        shell: cmd
        run: installer\build_dbcheck.bat

      - name: Build Windows installer
        shell: cmd
        env:
          INSTALLER_VERSION: ${{ steps.ver.outputs.version }}
        run: build_installer.bat < NUL

      # ----- collect + verify -----
      - name: Locate installer artifact
        id: artifact
        shell: pwsh
        run: |
          $v = '${{ steps.ver.outputs.version }}'
          $path = "backend\dist\installer\KTHEALTHERP_Setup_$v.exe"
          if (-not (Test-Path $path)) {
            Write-Error "Installer not found at $path"
            Get-ChildItem backend\dist\installer -ErrorAction SilentlyContinue
            exit 1
          }
          $size = (Get-Item $path).Length
          Write-Host "Installer: $path ($size bytes)"
          "path=$path" | Out-File $env:GITHUB_OUTPUT -Append

      # ----- sign update manifest (releases only) -----
      # Produces manifest.json signed with the same Ed25519 key the app uses
      # to verify .lic files. The app fetches this from releases/latest/download/
      # to decide whether a self-update is available.
      - name: Build signed update manifest
        if: steps.ver.outputs.is_release == 'true'
        id: manifest
        shell: pwsh
        run: |
          $v = '${{ steps.ver.outputs.version }}'
          $installer = '${{ steps.artifact.outputs.path }}'
          $out = 'backend\dist\installer\manifest.json'
          python backend\tools\build_release_manifest.py `
            --installer "$installer" `
            --version "$v" `
            --private-key 'backend\tools\private_key.pem' `
            --output "$out"
          if ($LASTEXITCODE -ne 0) { Write-Error "Manifest build failed"; exit 1 }
          "path=$out" | Out-File $env:GITHUB_OUTPUT -Append

      # ----- upload -----
      - name: Upload installer artifact
        uses: actions/upload-artifact@v5
        with:
          name: KTHEALTHERP_Setup_${{ steps.ver.outputs.version }}
          path: ${{ steps.artifact.outputs.path }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload manifest artifact
        if: steps.ver.outputs.is_release == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: manifest_${{ steps.ver.outputs.version }}
          path: ${{ steps.manifest.outputs.path }}
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        if: steps.ver.outputs.is_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        shell: pwsh
        run: |
          $tag = "v${{ steps.ver.outputs.version }}"
          $title = "KT HEALTH ERP ${{ steps.ver.outputs.version }}"
          $repo = "saiteja-bellam-1/KTH-releases"
          gh release view $tag --repo $repo 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --repo $repo --title "$title" --notes "Automated build from commit $env:GITHUB_SHA"
          }
          gh release upload $tag --repo $repo '${{ steps.artifact.outputs.path }}' --clobber
          gh release upload $tag --repo $repo '${{ steps.manifest.outputs.path }}' --clobber

      # ----- (stub) code signing -----
      # When SIGNING_CERT_BASE64 is configured as a secret, we'd decode it
      # to a temp .pfx, set SIGNING_CERT/SIGNING_PASS env vars BEFORE the
      # build_exe.bat / build_installer.bat steps, and signtool would run
      # automatically (logic already in those scripts). Until the cert is
      # provisioned, the build is unsigned and SmartScreen will warn end
      # users on first install. See installer/README.md.
